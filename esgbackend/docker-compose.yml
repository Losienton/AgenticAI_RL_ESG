version: '3.8'

services:
  ai-network-processor:
    build: .
    container_name: ai-network-processor
    ports:
      - "8000:8000"
    volumes:
      - ./telemetry/models:/app/telemetry/models
      - ./telemetry/restconf_output:/app/telemetry/restconf_output
      - ./logs:/app/logs
    environment:
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
